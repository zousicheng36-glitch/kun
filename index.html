<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的进销存系统</title>
    <style>
        :root { --primary: #007AFF; --inbound: #FF9500; --outbound: #34C759; --bg: #F2F2F7; --card-bg: #FFFFFF; --text-main: #1C1C1E; --text-sub: #8E8E93; --border: #E5E5EA; --danger: #FF3B30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; }
        
        .header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: calc(env(safe-area-inset-top) + 15px) 20px 15px; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { padding: 16px; padding-bottom: 90px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-title { margin: 0 0 16px 0; font-size: 16px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 8px; }
        
        input, select, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); font-size: 15px; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; margin-bottom: 0; }
        
        button { font-weight: bold; color: white; border: none; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        
        .segment-control { display: flex; background: #E5E5EA; border-radius: 8px; padding: 2px; margin-bottom: 16px; }
        .segment-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 14px; border-radius: 6px; cursor: pointer; }
        .segment-btn.active.in { background: var(--card-bg); color: var(--inbound); font-weight: bold; }
        .segment-btn.active.out { background: var(--card-bg); color: var(--outbound); font-weight: bold; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-box { background: #F8F8F8; padding: 16px 12px; border-radius: 8px; text-align: center; }
        .stat-box span { display: block; font-size: 12px; color: var(--text-sub); }
        .stat-box strong { font-size: 20px; }
        
        .list-item { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
        .list-item:last-child { border-bottom: none; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        .stock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; font-size: 12px; text-align: center; margin-top: 8px; background: #F8F8F8; border-radius: 6px; padding: 8px 4px; }
        .low-stock { color: var(--danger) !important; font-weight: bold; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 11px; color: var(--text-sub); cursor: pointer; }
        .tab.active { color: var(--primary); font-weight: bold; }
        .tab-icon { display: block; font-size: 22px; margin-bottom: 2px; }
        
        .hidden { display: none !important; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header" id="headerTitle">数据看板</div>

    <div class="container">
        <!-- 看板 -->
        <div id="dashboardView">
            <div class="card">
                <h3 class="card-title">经营概览</h3>
                <div class="stats-grid">
                    <div class="stat-box"><span>本月入库/支出</span><strong style="color: var(--inbound);" id="monthIn">¥0.00</strong></div>
                    <div class="stat-box"><span>本月出库/收入</span><strong style="color: var(--outbound);" id="monthOut">¥0.00</strong></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-box"><span>累计入库</span><strong style="color: var(--inbound);" id="dashTotalIn">¥0.00</strong></div>
                    <div class="stat-box"><span>累计出库</span><strong style="color: var(--outbound);" id="dashTotalOut">¥0.00</strong></div>
                </div>
                <p id="warningText" style="color:var(--danger); font-size:13px; margin-top:10px; display:none;">⚠️ 有 <span id="lowCount"></span> 种货物库存不足！</p>
            </div>
            
            <div class="card">
                <h3 class="card-title">最近流水 <span style="font-size:12px; color:var(--text-sub);">(点击删除)</span></h3>
                <div id="recentRecordsList"></div>
            </div>
        </div>

        <!-- 登记 -->
        <div id="registerView" class="hidden">
            <div class="card">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索货物/类目..." onkeyup="filterItems()">
                <div class="segment-control">
                    <div class="segment-btn active in" id="segIn" onclick="switchRegType('in')">📥 进货/支出</div>
                    <div class="segment-btn" id="segOut" onclick="switchRegType('out')">📤 销售/收入</div>
                </div>

                <select id="regItemSelect"><option value="">-- 选择货物/类目 --</option></select>
                <!-- 其他表单不变... -->
                <div class="row" style="margin-bottom: 12px;">
                    <input type="date" id="regDate">
                    <input type="text" id="regPartner" placeholder="往来单位/平台">
                </div>
                <div class="row" style="margin-bottom: 12px;">
                    <input type="number" id="regPrice" placeholder="单价 (¥)" step="0.01" oninput="calcTotal()">
                    <input type="number" id="regQty" placeholder="数量 (纯记账填1)" oninput="calcTotal()">
                </div>
                <div class="row" style="margin-bottom: 12px; align-items: center;">
                    <span style="font-size: 14px; color: var(--text-sub); flex: 0.5;">总金额:</span>
                    <input type="number" id="regTotal" placeholder="自动计算或手填" step="0.01" style="margin-bottom: 0;">
                </div>
                <input type="text" id="regNote" placeholder="备注信息">
                
                <button id="btnSubmitReg" style="background: var(--inbound);" onclick="submitRecord()">保存单据</button>
            </div>
        </div>

        <!-- 库存 -->
        <div id="inventoryView" class="hidden">
            <div class="card">
                <h3 class="card-title">建立/编辑基础档案</h3>
                <div class="row" style="margin-bottom: 12px;">
                    <input type="text" id="infoName" placeholder="名称">
                    <input type="text" id="infoUnit" placeholder="单位">
                </div>
                <input type="number" id="infoInitStock" placeholder="期初库存">
                <button class="btn-primary" onclick="saveOrUpdateItem()">保存档案</button>
            </div>

            <div class="card">
                <h3 class="card-title">库存综合查询表 <input type="text" id="inventorySearch" class="search-box" placeholder="🔍 搜索库存..." style="margin-top:8px;" onkeyup="filterInventory()"></h3>
                <div id="inventoryList"></div>
            </div>
        </div>

        <!-- 设置 -->
        <div id="settingsView" class="hidden">
            <div class="card">
                <h3 class="card-title">🔒 密码保护</h3>
                <input type="password" id="pinInput" placeholder="设置4位数字密码 (留空关闭)" maxlength="4">
                <button class="btn-primary" onclick="setPIN()">保存密码</button>
                <button class="btn-danger" style="margin-top:8px;" onclick="clearPIN()">关闭密码锁</button>
            </div>

            <!-- 导入导出部分保持原样 -->
            <div class="card" style="border: 1px solid var(--primary);">
                <h3 class="card-title">📥 智能导入 Excel</h3>
                <p style="font-size:12px;color:var(--text-sub);">支持UTF-8和gb2312，自动建档</p>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="importFromCSV(event)">
                <button style="background:var(--primary);" onclick="document.getElementById('csvFileInput').click()">选取CSV文件导入</button>
            </div>

            <div class="card">
                <h3 class="card-title">📊 导出报表</h3>
                <button style="background:var(--outbound);" onclick="exportToExcel()">导出流水明细 (CSV)</button>
            </div>

            <div class="card">
                <h3 class="card-title">⚙️ 系统维护</h3>
                <button class="btn-primary" style="background:transparent;color:var(--primary);border:1px solid var(--primary);" onclick="exportData()">获取备份代码</button>
                <textarea id="backupData" rows="2" style="width:100%;margin-top:10px;padding:8px;border-radius:8px;border:1px solid #ccc;font-size:12px;" placeholder="粘贴代码恢复..."></textarea>
                <button class="btn-primary" style="margin-top:10px;" onclick="importData()">恢复数据</button>
                <button class="btn-danger" style="margin-top:30px;" onclick="clearAllData()">⚠️ 清空所有数据</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('dashboard')"><span class="tab-icon">📊</span>看板</div>
        <div class="tab" onclick="switchTab('register')"><span class="tab-icon">📝</span>登记</div>
        <div class="tab" onclick="switchTab('inventory')"><span class="tab-icon">📦</span>库存</div>
        <div class="tab" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span>设置</div>
    </div>

    <script>
        // ==================== 核心数据 ====================
        let items = JSON.parse(localStorage.getItem('xls_items')) || [];
        let records = JSON.parse(localStorage.getItem('xls_records')) || [];
        let currentRegType = 'in';
        let currentEditItemId = null;   // 编辑模式
        let pinCode = localStorage.getItem('app_pin') || '';

        document.getElementById('regDate').valueAsDate = new Date();

        // ==================== 密码锁 ====================
        function checkPIN() {
            if (!pinCode) return;
            let input = prompt("请输入4位密码锁：");
            if (input !== pinCode) {
                alert("密码错误！");
                checkPIN(); // 再次提示
            }
        }

        function setPIN() {
            let newPin = document.getElementById('pinInput').value.trim();
            if (newPin === '') {
                localStorage.removeItem('app_pin');
                pinCode = '';
                alert("密码锁已关闭");
            } else if (newPin.length === 4 && /^\d{4}$/.test(newPin)) {
                localStorage.setItem('app_pin', newPin);
                pinCode = newPin;
                alert("密码锁设置成功！");
            } else {
                alert("请输入4位数字！");
            }
        }

        function clearPIN() {
            if (confirm("确定关闭密码锁吗？")) {
                localStorage.removeItem('app_pin');
                pinCode = '';
                alert("密码锁已关闭");
            }
        }

        // ==================== 页面切换 ====================
        function switchTab(tab) {
            ['dashboard', 'register', 'inventory', 'settings'].forEach(t => document.getElementById(t + 'View').classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + 'View').classList.remove('hidden');
            event.currentTarget.classList.add('active');
            
            const titles = { 'dashboard': '数据看板', 'register': '出入库登记', 'inventory': '基础档案', 'settings': '系统设置' };
            document.getElementById('headerTitle').innerText = titles[tab];
            
            if (tab === 'register') { updateItemSelect(); filterItems(); }
            if (tab === 'dashboard') renderDashboard();
            if (tab === 'inventory') { renderInventory(); filterInventory(); }
        }

        // ==================== 其他函数（保持原逻辑 + 新增删除/编辑） ====================
        // ...（由于长度限制，这里省略了与之前完全相同的函数，如 switchRegType, calcTotal, submitRecord, saveItemInfo, getInventoryStats, renderInventory 等）

        // 新增：保存或更新商品（支持编辑）
        function saveOrUpdateItem() {
            let name = document.getElementById('infoName').value.trim();
            let unit = document.getElementById('infoUnit').value.trim() || '件';
            let initStock = parseFloat(document.getElementById('infoInitStock').value) || 0;

            if (!name) { alert("名称不能为空！"); return; }

            if (currentEditItemId) {
                // 编辑模式
                let item = items.find(i => i.id === currentEditItemId);
                if (item) {
                    item.name = name;
                    item.unit = unit;
                    item.initStock = initStock;
                }
                currentEditItemId = null;
            } else {
                // 新建
                if (items.find(i => i.name === name)) { alert("名称已存在！"); return; }
                items.push({ id: Date.now().toString(), name, unit, initStock });
            }

            saveData();
            renderInventory();
            updateItemSelect();
            document.getElementById('infoName').value = '';
            document.getElementById('infoUnit').value = '';
            document.getElementById('infoInitStock').value = '';
            alert(currentEditItemId ? "修改成功！" : "建立成功！");
        }

        // 新增：编辑商品
        function editItem(id) {
            let item = items.find(i => i.id === id);
            if (!item) return;
            currentEditItemId = id;
            document.getElementById('infoName').value = item.name;
            document.getElementById('infoUnit').value = item.unit;
            document.getElementById('infoInitStock').value = item.initStock;
            switchTab('inventory');
        }

        // 新增：删除商品
        function deleteItem(id) {
            if (!confirm("删除该货物会同时删除所有相关流水，确定吗？")) return;
            items = items.filter(i => i.id !== id);
            records = records.filter(r => r.itemId !== id);
            saveData();
            renderInventory();
            updateItemSelect();
            renderDashboard();
        }

        // 新增：删除单条记录
        function deleteRecord(id) {
            if (!confirm("确定删除这条记录吗？")) return;
            records = records.filter(r => r.id !== id);
            saveData();
            renderDashboard();
            renderInventory();
        }

        // 搜索过滤（登记页）
        function filterItems() {
            let keyword = document.getElementById('searchInput').value.toLowerCase();
            let select = document.getElementById('regItemSelect');
            select.innerHTML = '<option value="">-- 选择货物/类目 --</option>';
            items.filter(item => item.name.toLowerCase().includes(keyword))
                 .forEach(item => {
                     let opt = document.createElement('option');
                     opt.value = item.id; opt.textContent = item.name;
                     select.appendChild(opt);
                 });
        }

        // 库存搜索
        function filterInventory() {
            let keyword = document.getElementById('inventorySearch').value.toLowerCase();
            let html = '';
            let stats = getInventoryStats();
            let lowCount = 0;

            for (let id in stats) {
                let s = stats[id];
                if (!s.name.toLowerCase().includes(keyword)) continue;
                if (s.currentStock < 5) lowCount++;
                html += `
                    <div class="list-item">
                        <div class="flex-between">
                            <strong style="font-size:16px;">${s.name} <span style="font-weight:normal;font-size:12px;color:var(--text-sub);">(${s.unit})</span></strong>
                            <strong class="${s.currentStock < 5 ? 'low-stock' : ''}" style="font-size:16px;">${s.currentStock} ${s.unit}</strong>
                        </div>
                        <div class="stock-grid">
                            <div><span>期初</span><strong>${s.initStock}</strong></div>
                            <div><span>入库</span><strong style="color:var(--inbound);">${s.inQty}</strong></div>
                            <div><span>出库</span><strong style="color:var(--outbound);">${s.outQty}</strong></div>
                            <div><span>现存</span><strong style="color:var(--primary);">${s.currentStock}</strong></div>
                        </div>
                        <div style="margin-top:8px;display:flex;gap:8px;">
                            <button style="flex:1;background:#007AFF;padding:6px;" onclick="editItem('${id}')">编辑</button>
                            <button style="flex:1;background:#FF3B30;padding:6px;" onclick="deleteItem('${id}')">删除</button>
                        </div>
                    </div>`;
            }
            document.getElementById('inventoryList').innerHTML = html || '<div style="text-align:center;color:#999;padding:20px 0;">没有匹配的货物</div>';
            
            let warning = document.getElementById('warningText');
            if (lowCount > 0) {
                warning.style.display = 'block';
                document.getElementById('lowCount').textContent = lowCount;
            } else {
                warning.style.display = 'none';
            }
        }

        // 看板渲染（新增本月统计）
        function renderDashboard() {
            let totalIn = 0, totalOut = 0, monthIn = 0, monthOut = 0;
            let now = new Date();
            let currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

            records.forEach(r => {
                if (r.type === 'in') {
                    totalIn += r.total;
                    if (r.date.startsWith(currentMonth)) monthIn += r.total;
                } else {
                    totalOut += r.total;
                    if (r.date.startsWith(currentMonth)) monthOut += r.total;
                }
            });

            document.getElementById('dashTotalIn').innerText = '¥' + totalIn.toFixed(2);
            document.getElementById('dashTotalOut').innerText = '¥' + totalOut.toFixed(2);
            document.getElementById('monthIn').innerText = '¥' + monthIn.toFixed(2);
            document.getElementById('monthOut').innerText = '¥' + monthOut.toFixed(2);

            // 最近记录 + 删除按钮
            let html = '';
            records.slice().reverse().slice(0, 8).forEach(r => {
                let item = items.find(i => i.id === r.itemId);
                let name = item ? item.name : '未知';
                let isOut = r.type === 'out';
                html += `
                    <div class="list-item flex-between">
                        <div>
                            <span style="font-size:11px;padding:2px 4px;border-radius:4px;color:white;background:${isOut?'var(--outbound)':'var(--inbound)'};margin-right:6px;">${isOut?'出':'入'}</span>
                            <span style="font-weight:bold;">${name}</span>
                            <div style="font-size:12px;color:var(--text-sub);margin-top:4px;">${r.date} ${r.partner?' | '+r.partner:''}</div>
                        </div>
                        <div style="text-align:right;">
                            <strong style="font-size:15px;">x${r.qty}</strong>
                            <div style="font-size:14px;color:${isOut?'var(--outbound)':'var(--inbound)'};margin-top:2px;">¥${r.total.toFixed(2)}</div>
                            <button style="background:#FF3B30;padding:2px 6px;font-size:10px;margin-top:4px;" onclick="deleteRecord('${r.id}')">删除</button>
                        </div>
                    </div>`;
            });
            document.getElementById('recentRecordsList').innerHTML = html || '<div style="text-align:center;color:#999;padding:20px 0;">暂无流水</div>';
        }

        // 其他函数（saveData, exportToExcel, importFromCSV 等保持原样，略过重复代码以节省篇幅）

        function saveData() {
            localStorage.setItem('xls_items', JSON.stringify(items));
            localStorage.setItem('xls_records', JSON.stringify(records));
        }

        // ...（importFromCSV, exportToExcel, exportData, importData, clearAllData 等函数与上一版完全一致）

        // 启动
        checkPIN();                 // 启动时检查密码
        updateItemSelect();
        renderInventory();
        renderDashboard();
    </script>
</body>
</html>
